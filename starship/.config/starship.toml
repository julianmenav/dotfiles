"$schema" = 'https://starship.rs/config-schema.json'

# 🌙 Minimal prompt, limpio y sin tanto color de fondo
format = """\
$os\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$python\
$docker_context\
$kubernetes\
$time\
$line_break\
$character"""

palette = 'catppuccin_mocha'

# 🎨 Paleta (necesaria para evitar el warning)
[palettes.catppuccin_mocha]
text = "#cdd6f4"
overlay1 = "#7f849c"
blue = "#89b4fa"
green = "#a6e3a1"
yellow = "#f9e2af"
peach = "#fab387"
teal = "#94e2d5"
sky = "#89dceb"
purple = "#b4befe"
mantle = "#181825"
red = "#f38ba8"

# 🔧 Módulos básicos
[os]
disabled = false
style = "fg:overlay1"
format = " [$symbol]($style) "

[os.symbols]
Macos = ""
Linux = "󰌽"
Arch = "󰣇"
CachyOS = "󰣇"
Ubuntu = "󰕈"
Fedora = "󰣛"
Windows = ""

[username]
show_always = true
style_user = "fg:text"
style_root = "fg:red"
format = "[$user]($style) "

[directory]
style = "fg:blue"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = "󰝚"
"Pictures" = ""
"Developer" = "󰲋"

[git_branch]
symbol = ""
style = "fg:green"
format = "[$symbol $branch]($style) "

[git_status]
style = "fg:yellow"
format = "[$all_status$ahead_behind]($style) "

[c]
symbol = ""
style = "fg:teal"
format = "[$symbol $version]($style) "

[rust]
symbol = "🦀"
style = "fg:peach"
format = "[$symbol $version]($style) "

[golang]
symbol = ""
style = "fg:sky"
format = "[$symbol $version]($style) "

[nodejs]
symbol = ""
style = "fg:green"
format = "[$symbol $version]($style) "

[python]
symbol = ""
style = "fg:yellow"
format = "[$symbol $version]($style) "

[docker_context]
symbol = ""
style = "fg:blue"
format = "[$symbol $context]($style) "

[kubernetes]
disabled = false
detect_folders = []
detect_files = []
detect_extensions = []
format = '[$symbol $context]($style) '
symbol = '⎈'
style = 'fg:teal'

[[kubernetes.contexts]]
context_pattern = 'arn:aws:eks:.*clickferry-prod'
context_alias = 'prod'
style = 'bold fg:red'

[[kubernetes.contexts]]
context_pattern = 'julian\.mena@clickferry'
context_alias = 'legacy'

[time]
disabled = false
time_format = "%H:%M"
style = "fg:overlay1"
format = "[$time]($style)"

[line_break]
disabled = false

[character]
success_symbol = '[](bold fg:green) '
error_symbol = '[](bold fg:red) '
vimcmd_symbol = '[](bold fg:green) '
vimcmd_replace_symbol = '[](bold fg:purple) '
vimcmd_visual_symbol = '[](bold fg:blue) '


