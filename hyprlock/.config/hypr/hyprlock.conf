background {
    monitor =
    path = screenshot
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg
    capslock_color = rgba(ffcc00ee) rgba(ff6633ee) 45deg

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT
    color = rgb(200, 200, 200)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:200] [[ $(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | head -1) == 1 ]] && echo "CAPS LOCK ON" || echo ""
    color = rgb(255, 204, 0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 70
    halign = center
    valign = center
}
